services:
  web:
    build:
      context: ./php
    container_name: admintech-web
    depends_on:
      - db
    networks:
      - admintech-net

  db:
    image: mysql:5.7.44
    container_name: admintech-db
    command: --default-authentication-plugin=mysql_native_password --sql-mode="ONLY_FULL_GROUP_BY,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-techos}
      TZ: ${TZ:-America/Argentina/Buenos_Aires}
    volumes:
      - admintech-mysql:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    networks:
      - admintech-net

volumes:
  admintech-mysql:

networks:
  admintech-net:
    driver: bridge